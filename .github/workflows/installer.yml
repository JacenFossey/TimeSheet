name: Test installer

# Full build that produces a runnable NSIS installer as an artifact, with updater
# artifact-signing disabled (no key needed yet). Use this to verify the app runs
# before wiring signing + tagging a release.
# ponytail: the `push` trigger is temporary so this runs on the feature branch
# (workflow_dispatch only resolves on the default branch). Remove before merging.
on:
  workflow_dispatch:
  push:
    branches: [tauri-port]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache tauri-cli
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-tauri.exe
          key: tauri-cli-v2

      - name: Install tauri-cli
        shell: pwsh
        run: |
          if (Test-Path "$HOME/.cargo/bin/cargo-tauri.exe") { Write-Host "tauri-cli restored from cache" }
          else { cargo install tauri-cli --version "^2" --locked }

      - name: Generate icons
        run: cargo tauri icon assets/icon.png

      - name: Build installer (no updater signing)
        shell: pwsh
        run: cargo tauri build --bundles nsis --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: timesheet-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
