name: Test installer

# Manually-triggered full build that produces a runnable NSIS installer as an
# artifact, with updater artifact-signing disabled (no key needed yet). Use this
# to verify the app actually runs before wiring signing + tagging a release.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache tauri-cli
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-tauri.exe
          key: tauri-cli-v2

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Generate icons
        run: cargo tauri icon assets/icon.png

      - name: Build installer (no updater signing)
        run: cargo tauri build --bundles nsis --config "{\"bundle\":{\"createUpdaterArtifacts\":false}}"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: timesheet-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
